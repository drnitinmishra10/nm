<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Class 1 Addition Worksheet - 20 Questions</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#a29bfe,#81ecec);
    min-height:100vh;
    padding:20px;
}

.container{
    max-width:950px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#6c5ce7;
    margin-bottom:10px;
    font-size:clamp(30px,5vw,46px);
}

.subtitle{
    text-align:center;
    color:#555;
    margin-bottom:25px;
    font-size:20px;
}

.score-box{
    text-align:center;
    font-size:30px;
    font-weight:bold;
    margin-bottom:30px;
    color:#0984e3;
}

.question-card{
    background:#f8f9ff;
    border:3px solid #dfe6e9;
    border-radius:20px;
    padding:20px;
    margin-bottom:20px;
    transition:0.3s;
}

.question-card:hover{
    transform:translateY(-4px);
    box-shadow:0 8px 18px rgba(0,0,0,0.1);
}

.question{
    text-align:center;
    font-size:clamp(28px,6vw,42px);
    font-weight:bold;
    color:#2d3436;
    margin-bottom:20px;
}

.input-area{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
}

input{
    width:110px;
    padding:12px;
    border-radius:12px;
    border:2px solid #74b9ff;
    font-size:24px;
    text-align:center;
    outline:none;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:12px;
    background:#00b894;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#019875;
}

.answer{
    margin-top:18px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
    display:none;
}

.correct{
    color:#00b894;
}

.wrong{
    color:#d63031;
}

.footer{
    text-align:center;
    margin-top:30px;
    font-size:18px;
    color:#555;
}

@media(max-width:600px){

    .container{
        padding:15px;
    }

    input{
        width:100%;
    }

    button{
        width:100%;
    }
}

</style>
</head>

<body>

<div class="container">

    <h1>🌟 Addition Practice 🌟</h1>

    <div class="subtitle">
        Class 1 Maths Worksheet - 20 Questions
    </div>

    <div class="score-box">
        Score: <span id="score">0</span> / 20
    </div>

    <div id="worksheet"></div>

    <div class="footer">
        🎉 Awesome Work Little Champion! 🎉
    </div>

</div>

<script>

const questions = [

    {a:1,b:2},
    {a:3,b:4},
    {a:2,b:5},
    {a:6,b:1},
    {a:4,b:3},
    {a:5,b:2},
    {a:7,b:1},
    {a:2,b:6},
    {a:8,b:1},
    {a:3,b:5},

    {a:4,b:4},
    {a:6,b:2},
    {a:1,b:7},
    {a:5,b:3},
    {a:2,b:4},
    {a:7,b:2},
    {a:3,b:3},
    {a:6,b:1},
    {a:4,b:5},
    {a:8,b:0}

];

let score = 0;

const worksheet = document.getElementById("worksheet");

questions.forEach((q,index)=>{

    const correctAnswer = q.a + q.b;

    const card = document.createElement("div");

    card.className = "question-card";

    card.innerHTML = `

        <div class="question">
            ${index+1}. ${q.a} + ${q.b} = ?
        </div>

        <div class="input-area">

            <input 
                type="number" 
                id="input-${index}" 
                min="0"
            >

            <button onclick="checkAnswer(${index},${correctAnswer})">
                Check Answer
            </button>

        </div>

        <div class="answer" id="answer-${index}"></div>

    `;

    worksheet.appendChild(card);

});

function checkAnswer(index, correctAnswer){

    const inputBox = document.getElementById(`input-${index}`);

    const answerBox = document.getElementById(`answer-${index}`);

    const userAnswer = Number(inputBox.value);

    if(answerBox.dataset.checked === "true"){
        return;
    }

    answerBox.style.display = "block";

    if(userAnswer === correctAnswer){

        answerBox.innerHTML = `✅ Right! Answer is ${correctAnswer}`;

        answerBox.className = "answer correct";

        score++;

        document.getElementById("score").innerText = score;

    }
    else{

        answerBox.innerHTML = `❌ Wrong! Correct Answer is ${correctAnswer}`;

        answerBox.className = "answer wrong";

    }

    answerBox.dataset.checked = "true";

}

</script>

</body>
</html>
